name: Sync Monday.com data

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync
        run: |
          RESPONSE=$(curl -s -X GET "${{ secrets.APP_URL }}/api/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || (echo "Sync returned error" && exit 1)
        continue-on-error: true
