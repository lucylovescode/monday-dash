<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Trilogy Care</title>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Figtree', system-ui, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .header {
      background: #2c4c79;
      height: 60px; padding: 0 24px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.2);
    }
    .header img { height: 32px; width: auto; }
    .header-text { font-size: 15px; font-weight: 700; color: white; }
    .header-sub  { font-size: 11px; color: rgba(255,255,255,0.55); font-weight: 500; }

    .main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }
    .card {
      background: white; border-radius: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      padding: 40px; width: 100%; max-width: 400px;
      text-align: center;
    }
    .card-title { font-size: 20px; font-weight: 800; color: #1e293b; margin-bottom: 6px; }
    .card-sub   { font-size: 13px; color: #94a3b8; font-weight: 500; margin-bottom: 32px; }

    .login-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 13px 20px;
      background: #2c4c79; color: white;
      border: none; border-radius: 10px;
      font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      transition: background 0.15s;
    }
    .login-btn:hover { background: #1e3a5f; }
    .login-btn svg { flex-shrink: 0; }

    .error {
      background: #fef2f2; border: 1px solid #fecaca;
      color: #dc2626; padding: 10px 14px; border-radius: 8px;
      font-size: 12px; font-weight: 600; margin-bottom: 20px;
      display: none;
    }
    .error.show { display: block; }

    .footer { text-align: center; padding: 20px; font-size: 11px; color: #cbd5e1; }
  </style>
</head>
<body>

<header class="header">
  <img src="/assets/Trilogy%20Logo.png" alt="Trilogy Care">
  <div>
    <div class="header-text">Trilogy Care</div>
    <div class="header-sub">Task Dashboard</div>
  </div>
</header>

<div class="main">
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in with your Monday.com account to continue</div>

    <div class="error" id="errorMsg"></div>

    <a href="/api/auth/login" class="login-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <rect width="24" height="24" rx="4" fill="white" fill-opacity="0.2"/>
        <path d="M6 17.5C6 16.12 7.12 15 8.5 15s2.5 1.12 2.5 2.5S9.88 20 8.5 20 6 18.88 6 17.5z" fill="#ff3d57"/>
        <path d="M10.75 8.5C10.75 7.12 11.87 6 13.25 6s2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5-2.5-1.12-2.5-2.5z" fill="#ffcb00"/>
        <path d="M15.5 17.5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5S19.38 20 17.5 20 15 18.88 15 17.5z" fill="#00ca72"/>
      </svg>
      Continue with Monday.com
    </a>
  </div>
</div>

<div class="footer">Trilogy Care Internal Tools</div>

<script>
  const params = new URLSearchParams(location.search);
  const err = params.get('error');
  if (err) {
    const msgs = {
      denied:        'Login was cancelled.',
      wrong_account: 'Your Monday.com account is not authorised for this dashboard.',
      auth_failed:   'Authentication failed. Please try again.',
      no_code:       'Something went wrong. Please try again.'
    };
    const el = document.getElementById('errorMsg');
    el.textContent = msgs[err] || 'An error occurred.';
    el.classList.add('show');
  }
</script>
</body>
</html>
